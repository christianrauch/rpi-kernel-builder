name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"

jobs:

  build:

    runs-on: ubuntu-26.04-arm

    steps:
    - uses: actions/checkout@v6

    - name: Cache Docker images.
      uses: ScribeMD/docker-cache@0.5.0
      with:
        key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile') }}

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag rpi-kernel-builder

    - run: |
        cd ./workspace/
        git clone --depth=1 --branch rpi-7.1.y https://github.com/raspberrypi/linux.git

    - name: build
      run: |
        docker run --rm \
          -v "$PWD/workspace/:/workspace/"\
          rpi-kernel-builder /workspace/build.sh

    - name: check output
      run: |
        ls ./workspace

    - uses: actions/upload-artifact@v7
      with:
        name: kernel-debs
        path: |
          ./workspace/linux-*.deb
          ./workspace/linux-upstream_*.buildinfo
          ./workspace/linux-upstream_*.changes
